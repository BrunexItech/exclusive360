version: '3.8'

services:
  db:
    image: postgres:15
    container_name: exclusive_db
    environment:
      POSTGRES_USER: exclusive_user
      POSTGRES_PASSWORD: exclusive_pass
      POSTGRES_DB: exclusive_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exclusive_user -d exclusive_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build: ./backend
    container_name: exclusive_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    ports:
      - "8007:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build: ./frontend
    container_name: exclusive_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5178:5173"
    environment:
      - VITE_API_URL=http://38.242.200.152:8007/api
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data: